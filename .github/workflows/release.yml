name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    name: Check, Test, Clippy
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev librsvg2-dev pkg-config
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build and Release
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev librsvg2-dev pkg-config
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package tarball
        run: |
          mkdir -p staging
          cp target/release/please-make-me-an-app staging/
          cp README.md LICENSE staging/
          tar -czf please-make-me-an-app-x86_64-linux.tar.gz -C staging please-make-me-an-app README.md LICENSE

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Strip leading "v" from the tag ref (refs/tags/v0.4.0 -> 0.4.0)
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract everything between "## [VERSION]" and the next "## [" heading
          awk "/^## \[${VERSION}\]/"'{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > release_body.md
          echo "--- extracted release body ---"
          cat release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            please-make-me-an-app-x86_64-linux.tar.gz

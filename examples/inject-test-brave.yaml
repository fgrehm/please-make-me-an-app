name: inject-test-brave
url: https://www.google.com
backend: brave
window:
  title: Inject Test
  width: 900
  height: 700
inject:
  css: |
    /* Adds a bright banner at the top of the page confirming CSS injection worked */
    body::before {
      content: 'pmma injection active';
      display: block;
      background: #22c55e;
      color: #fff;
      font: bold 13px/28px monospace;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 999999;
    }
  js: |
    console.log('[pmma] JS injection active, run_at: document_start');
    window.__pmma_injected = true;
